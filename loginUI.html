<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      height: 100vh;
      display: flex;
      background: linear-gradient(to right, #D56269 50%, #FFE2E3 50%);
    }

    .container {
      margin: auto;
      width: 85%;
      max-width: 1100px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      display: flex;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }

    /* LEFT PANEL */
    .left {
      flex: 1;
      padding: 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .left img {
      width: 100%;
      max-width: 380px;
      margin-bottom: 20px;
    }

    .left h2 {
      font-size: 26px;
      font-weight: 700;
      color: #1f1f1f;
      margin-bottom: 10px;
    }

    .left p {
      font-size: 14px;
      line-height: 1.6;
      color: #6b6b6b;
      max-width: 420px;
    }

    /* RIGHT PANEL */
    .right {
      flex: 1;
      padding: 50px;
      background: rgba(255,255,255,0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .right h2 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 26px;
      color: #1f1f1f;
    }

    .input-box {
      width: 100%;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      background: #e9edf3;
      font-size: 14px;
      outline: none;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      margin-bottom: 15px;
    }

    .row a {
      text-decoration: none;
      color: #777;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #1f1f1f;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      background: #D56269;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    button:hover {
      background: #c14f56;
    }

    .error {
      color: red;
      font-size: 12px;
      margin-bottom: 10px;
      text-align: center;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left">
    <img src="https://warcssm.1xtel.co/media/media/6ec15cca-8846-4236-aa7d-aa992bf37e7f/mkt+vector.jpg">
    
    <h2>Messaging solutions to scale your business</h2>
    
    <p>
      SMS Solution with end-to-end encryption. DLT Friendly. Realtime analytics.
      Multiple API compatibility. Intelligent operator routing.
      Auto-scaling system.
    </p>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <h2>Sign In</h2>

    <div class="input-box">
      <input type="email" id="email" placeholder="Email">
    </div>

    <div class="input-box">
      <input type="password" id="password" placeholder="Password">
    </div>

    <div class="row">
      <div class="checkbox">
        <input type="checkbox" checked>
        <span>I accept Terms</span>
      </div>

      <a href="#">Forgot Password?</a>
    </div>

    <div id="error" class="error"></div>

    <button onclick="login()">
      Sign In →
    </button>

  </div>

</div>

<script>
async function login() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!email || !password) {
    document.getElementById("error").innerText = "All fields required";
    return;
  }

  const res = await fetch('/api/loginUser', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (!data.success) {
    document.getElementById("error").innerText = "Invalid credentials";
  } else {
    localStorage.setItem("user", JSON.stringify(data.user));
    window.location.href = "/";
  }
}
</script>

</body>
</html>
