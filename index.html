<!DOCTYPE html>
<html>
<head>
  <title>Account Opening Dashboard</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: #f4f6f9;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      background: #ffffff;
      height: 100vh;
      border-right: 1px solid #eee;
      transition: 0.3s;
    }

    .sidebar.hide {
      width: 0;
      overflow: hidden;
    }

    .logo {
      padding: 20px;
      font-weight: 700;
      font-size: 20px;
      color: #e60023;
    }

    .menu {
      padding: 10px;
    }

    .menu div {
      padding: 12px;
      margin-bottom: 5px;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
    }

    .menu div:hover {
      background: #f5f5f5;
    }

    .active {
      background: #ffe6e6;
      color: #e60023;
      font-weight: 600;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 20px;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .toggle-btn {
      cursor: pointer;
      font-size: 20px;
    }

    .title {
      font-size: 22px;
      font-weight: 600;
    }

    /* CARDS */
    .cards {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      flex: 1;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .card-title {
      font-size: 13px;
      color: #888;
    }

    .card-value {
      font-size: 22px;
      font-weight: 700;
      margin-top: 5px;
    }

    /* FILTER BAR */
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .filters input, .filters select {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-family: 'Manrope';
    }

    .btn {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-filter {
      background: #ff7a00;
      color: white;
    }

    .btn-download {
      background: #1f4e8c;
      color: white;
    }

    /* TABLE */
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #1f4e8c;
      color: white;
      padding: 10px;
      font-size: 13px;
      text-align: left;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      font-size: 13px;
    }

    tr:hover {
      background: #f9f9f9;
    }

  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="logo">
  <img src="https://warcssm.1xtel.co/media/media/2b47ba00-2481-4131-a600-0d2ebd01f0b5/OneXtel_Logo_P.jpg"
       alt="Onextel Logo"
       style="height: 40px; width: auto;">
</div>

  <div class="menu">
    <div class="active">Milestone 1</div>
    <div>Milestone 2</div>
    <div>Milestone 3</div>
    <div>Milestone 4</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER -->
  <div class="header">
    <div>
      <span class="toggle-btn" onclick="toggleSidebar()">☰</span>
      <span class="title">Dashboard - Account Opening</span>
    </div>
  </div>

  <!-- CARDS -->
  <div class="cards">
    <div class="card">
      <div class="card-title">Total Records</div>
      <div class="card-value" id="totalCount">0</div>
    </div>

    <div class="card">
      <div class="card-title">OTP Verified</div>
      <div class="card-value" id="verifiedCount">0</div>
    </div>

    <div class="card">
      <div class="card-title">Pending</div>
      <div class="card-value" id="pendingCount">0</div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <input type="text" id="mobile" placeholder="Mobile">
    <input type="text" id="urn" placeholder="URN">
    <input type="date" id="date">

    <select id="status">
      <option value="">All Status</option>
      <option value="OTP Verified">OTP Verified</option>
      <option value="PENDING">PENDING</option>
    </select>

    <button class="btn btn-filter" onclick="applyFilters()">FILTER</button>
    <button class="btn btn-download" onclick="downloadCSV()">DOWNLOAD</button>
  </div>

  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>S.No</th>
        <th>URN</th>
        <th>Mobile</th>
        <th>Date</th>
        <th>Time</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<script>
let fullData = [];

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("hide");
}

function loadData() {
  fetch('/api/getAccMile1')
    .then(res => res.json())
    .then(result => {
      fullData = result.data || [];
      renderTable(fullData);
      updateCards(fullData);
    });
}

function renderTable(data) {
  const table = document.getElementById("tableBody");
  table.innerHTML = "";

  data.forEach((item, i) => {
    table.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${item.urn}</td>
        <td>${item.mobile_number}</td>
        <td>${item.date}</td>
        <td>${item.time}</td>
        <td>${item.otp_validation}</td>
      </tr>
    `;
  });
}

function updateCards(data) {
  document.getElementById("totalCount").innerText = data.length;

  let verified = data.filter(d => d.otp_validation === "OTP Verified").length;
  let pending = data.filter(d => d.otp_validation !== "OTP Verified").length;

  document.getElementById("verifiedCount").innerText = verified;
  document.getElementById("pendingCount").innerText = pending;
}

function applyFilters() {
  const mobile = document.getElementById("mobile").value;
  const urn = document.getElementById("urn").value;
  const date = document.getElementById("date").value;
  const status = document.getElementById("status").value;

  let filtered = fullData.filter(item => {
    return (
      (!mobile || item.mobile_number.includes(mobile)) &&
      (!urn || item.urn.includes(urn)) &&
      (!date || item.date === date) &&
      (!status || item.otp_validation === status)
    );
  });

  renderTable(filtered);
  updateCards(filtered);
}

function downloadCSV() {
  let csv = "URN,Mobile,Date,Time,Status\n";

  fullData.forEach(item => {
    csv += `${item.urn},${item.mobile_number},${item.date},${item.time},${item.otp_validation}\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = "report.csv";
  a.click();
}

loadData();
</script>

</body>
</html>
