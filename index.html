<!DOCTYPE html>
<html>
<head>
  <title>Account Opening Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: #f4f6f9;
      display: flex;
    }

    .sidebar {
      width: 240px;
      background: white;
      height: 100vh;
      border-right: 1px solid #eee;
    }

    .logo {
      padding: 15px 20px;
    }

    .logo img {
      max-width: 140px;
    }

    .menu {
      padding: 10px;
    }

    .menu div {
      padding: 12px;
      margin-bottom: 5px;
      cursor: pointer;
      border-radius: 6px;
    }

    .menu div:hover {
      background: #f5f5f5;
    }

    .active {
      background: #ffe6e6;
      color: #e60023;
      font-weight: 600;
    }

    .main {
      flex: 1;
      padding: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .filters {
      display: flex;
      gap: 10px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    table {
      width: 100%;
      background: white;
      border-collapse: collapse;
    }

    th {
      background: #f5f7fb;
      padding: 12px;
      text-align: left;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #eee;
    }

    .badge-success {
      background: #e6f7ee;
      color: green;
      padding: 4px 8px;
      border-radius: 10px;
    }

    .badge-pending {
      background: #fff4e5;
      color: orange;
      padding: 4px 8px;
      border-radius: 10px;
    }

  </style>
</head>

<body>

<script>
if (!localStorage.getItem("user")) {
  window.location.href = "/loginUI.html";
}
</script>

<div class="sidebar">
  <div class="logo">
    <img src="https://warcssm.1xtel.co/media/media/2b47ba00-2481-4131-a600-0d2ebd01f0b5/OneXtel_Logo_P.jpg">
  </div>

  <div class="menu">
    <div class="active" onclick="loadMilestone('mile1', this)">Milestone 1</div>
    <div onclick="loadMilestone('mile2', this)">Milestone 2</div>
  </div>
</div>

<div class="main">

  <div class="header">
    <h3>Account Opening Reports</h3>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="filters">
    <input type="text" id="mobile" placeholder="Mobile">
    <input type="text" id="urn" placeholder="URN">
    <button onclick="applyFilters()">Filter</button>
  </div>

  <table>
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<script>

let fullData = [];

function logout() {
  localStorage.removeItem("user");
  window.location.href = "/loginUI.html";
}

function setActive(el) {
  document.querySelectorAll('.menu div').forEach(d => d.classList.remove('active'));
  el.classList.add('active');
}

// 🔥 Load Milestones
function loadMilestone(type, el) {

  if (el) setActive(el);

  let api = type === 'mile1'
    ? '/api/getAccMile1'
    : '/api/getAccMile2';

  fetch(api)
    .then(res => res.json())
    .then(result => {
      fullData = result.data || [];

      if (type === 'mile1') renderMile1(fullData);
      else renderMile2(fullData);
    });
}

// 🧩 Mile 1
function renderMile1(data) {

  document.getElementById("tableHead").innerHTML = `
    <tr>
      <th>S.No</th>
      <th>URN</th>
      <th>Mobile</th>
      <th>Date</th>
      <th>Time</th>
      <th>Status</th>
    </tr>
  `;

  renderTable(data, 'mile1');
}

// 🧩 Mile 2
function renderMile2(data) {

  document.getElementById("tableHead").innerHTML = `
    <tr>
      <th>S.No</th>
      <th>URN</th>
      <th>Account Type</th>
      <th>Name</th>
      <th>PAN</th>
      <th>Status</th>
      <th>Father</th>
      <th>Mobile</th>
      <th>Date</th>
      <th>Time</th>
    </tr>
  `;

  renderTable(data, 'mile2');
}

// 🔥 Common renderer
function renderTable(data, type) {

  const table = document.getElementById("tableBody");
  table.innerHTML = "";

  data.forEach((item, i) => {

    let row = '';

    if (type === 'mile1') {
      row = `
        <tr>
          <td>${i+1}</td>
          <td>${item.urn}</td>
          <td>${item.mobile_number}</td>
          <td>${item.date}</td>
          <td>${item.time}</td>
          <td>${item.otp_validation === 'OTP Verified'
            ? '<span class="badge-success">Verified</span>'
            : '<span class="badge-pending">Pending</span>'}
          </td>
        </tr>
      `;
    }

    if (type === 'mile2') {
      row = `
        <tr>
          <td>${i+1}</td>
          <td>${item.urn}</td>
          <td>${item.account_type || '-'}</td>
          <td>${item.full_name || '-'}</td>
          <td>${item.pan_number || '-'}</td>
          <td>${item.pan_status === 'Verified'
            ? '<span class="badge-success">Verified</span>'
            : '<span class="badge-pending">Pending</span>'}
          </td>
          <td>${item.father_name || '-'}</td>
          <td>${item.mobile_number}</td>
          <td>${item.date}</td>
          <td>${item.time}</td>
        </tr>
      `;
    }

    table.innerHTML += row;
  });
}

// 🔍 Filter
function applyFilters() {

  const mobile = document.getElementById("mobile").value;
  const urn = document.getElementById("urn").value;

  const filtered = fullData.filter(item =>
    (!mobile || item.mobile_number.includes(mobile)) &&
    (!urn || item.urn.includes(urn))
  );

  renderTable(filtered, document.querySelector('.active').innerText.includes('1') ? 'mile1' : 'mile2');
}

// 🚀 Default load
loadMilestone('mile1');

</script>

</body>
</html>
