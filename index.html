<!DOCTYPE html>
<html>
<head>
  <title>Account Opening Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: #f4f6f9;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      background: white;
      height: 100vh;
      border-right: 1px solid #eee;
      transition: 0.3s;
    }

    .sidebar.hide {
      width: 0;
      overflow: hidden;
    }

    .logo {
      padding: 15px 20px;
      display: flex;
      align-items: center;
    }

    .logo img {
      max-width: 140px;
    }

    .menu {
      padding: 10px;
    }

    .menu div {
      padding: 12px;
      margin-bottom: 5px;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
    }

    .menu div:hover {
      background: #f5f5f5;
    }

    .active {
      background: #ffe6e6;
      color: #e60023;
      font-weight: 600;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 20px;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .toggle-btn {
      cursor: pointer;
      font-size: 20px;
      margin-right: 10px;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
    }

    .logout-btn {
      background: #c62828;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* FILTER BAR */
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
      background: white;
      padding: 15px;
      border-radius: 10px;
    }

    .filters input {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-family: 'Manrope';
    }

    .btn {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-filter {
      background: #ff7a00;
      color: white;
    }

    .btn-download {
      background: #1f4e8c;
      color: white;
    }

    /* TABLE */
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      font-size: 13px;
    }

    th {
      background: #f5f7fb;
      color: #666;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid #eaeaea;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
    }

    tr:hover {
      background: #fafafa;
    }

    /* STATUS BADGES */
    .badge {
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-success {
      background: #e6f7ee;
      color: #1f9d55;
    }

    .badge-pending {
      background: #fff4e5;
      color: #f59e0b;
    }

  </style>
</head>

<body>

<!-- 🔐 AUTH CHECK -->
<script>
if (!localStorage.getItem("user")) {
  window.location.href = "/loginUI.html";
}
</script>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="logo">
    <img src="https://warcssm.1xtel.co/media/media/2b47ba00-2481-4131-a600-0d2ebd01f0b5/OneXtel_Logo_P.jpg">
  </div>

  <div class="menu">
    <div class="active">Milestone 1</div>
    <div>Milestone 2</div>
    <div>Milestone 3</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER -->
  <div class="header">
    <div>
      <span class="toggle-btn" onclick="toggleSidebar()">☰</span>
      <span class="title">Account Opening Reports</span>
    </div>

    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <input type="text" id="mobile" placeholder="Mobile">
    <input type="text" id="urn" placeholder="URN">
    <input type="date" id="date">

    <button class="btn btn-filter" onclick="applyFilters()">Filter</button>
    <button class="btn btn-download" onclick="downloadCSV()">Download</button>
  </div>

  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>S.No</th>
        <th>URN</th>
        <th>Mobile</th>
        <th>Date</th>
        <th>Time</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody id="tableBody"></tbody>
  </table>

</div>

<script>
let fullData = [];

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("hide");
}

function logout() {
  localStorage.removeItem("user");
  window.location.href = "/loginUI.html";
}

function loadData() {
  fetch('/api/getAccMile1')
    .then(res => res.json())
    .then(result => {
      fullData = result.data || [];
      renderTable(fullData);
    });
}

function renderTable(data) {
  const table = document.getElementById("tableBody");
  table.innerHTML = "";

  data.forEach((item, i) => {
    table.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${item.urn}</td>
        <td>${item.mobile_number}</td>
        <td>${item.date}</td>
        <td>${item.time}</td>
        <td>
          ${
            item.otp_validation === "OTP Verified"
              ? '<span class="badge badge-success">Verified</span>'
              : '<span class="badge badge-pending">Pending</span>'
          }
        </td>
      </tr>
    `;
  });
}

function applyFilters() {
  const mobile = document.getElementById("mobile").value;
  const urn = document.getElementById("urn").value;
  const date = document.getElementById("date").value;

  let filtered = fullData.filter(item => {
    return (
      (!mobile || item.mobile_number.includes(mobile)) &&
      (!urn || item.urn.includes(urn)) &&
      (!date || item.date === date)
    );
  });

  renderTable(filtered);
}

function downloadCSV() {
  let csv = "URN,Mobile,Date,Time,Status\n";

  fullData.forEach(item => {
    csv += `${item.urn},${item.mobile_number},${item.date},${item.time},${item.otp_validation}\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = "report.csv";
  a.click();
}

loadData();
</script>

</body>
</html>
