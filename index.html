// ✅ LOAD ANALYTICS DASHBOARD
function loadAnalytics() {

  currentMilestone = 'analytics';

// ================================
// 📊 FUNNEL CHART
// ================================
async function loadFunnelChart() {

  try {
    const res = await fetch('/api/getFunnel');
    const result = await res.json();

    if (!result.success || !result.data) {
      console.error("Funnel API error", result);
      return;
    }

    const d = result.data;
    const ctx = document.getElementById("funnelChart");

    if (!ctx) {
      console.error("funnelChart not found");
      return;
    }

    // Destroy previous chart
    if (window.funnelInstance) {
      window.funnelInstance.destroy();
    }

    window.funnelInstance = new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ['M1 OTP', 'M2 PAN', 'M3 KYC', 'M4 Details', 'Final'],
    datasets: [{
      label: 'Users',
      data: [d.mile1, d.mile2, d.mile3, d.mile4, d.final]
    }]
  },
  options: {
    responsive: true,
    plugins: {
      legend: { display: false },

      // ✅ ADD LABELS
      tooltip: {
        callbacks: {
          label: function(context) {

            const data = [d.mile1, d.mile2, d.mile3, d.mile4, d.final];
            const index = context.dataIndex;

            if (index === 0) return `Users: ${context.raw}`;

            const prev = data[index - 1];
            const curr = data[index];

            const conversion = prev ? ((curr / prev) * 100).toFixed(1) : 0;

            return `Users: ${curr} (${conversion}% from prev)`;
          }
        }
      }
    }
  }
});

    // Update KPIs
    showDropOff(d);

  } catch (err) {
    console.error("Funnel Chart Error:", err);
  }
}

// ================================
// 📊 DROP-OFF KPI
// ================================
function showDropOff(d) {

  const calc = (a, b) => {
    if (!a || a === 0) return '0%';
    return (((a - b) / a) * 100).toFixed(1) + '%';
  };

  const el1 = document.getElementById("drop1");
  const el2 = document.getElementById("drop2");
  const el3 = document.getElementById("drop3");
  const el4 = document.getElementById("drop4");

  if (el1) el1.innerText = calc(d.mile1, d.mile2);
  if (el2) el2.innerText = calc(d.mile2, d.mile3);
  if (el3) el3.innerText = calc(d.mile3, d.mile4);
  if (el4) el4.innerText = calc(d.mile4, d.final);
}

// ================================
// 📈 TREND CHART
// ================================
async function loadTrendChart() {

  try {
    const res = await fetch('/api/getTrend');
    const result = await res.json();

    if (!result.success || !result.data) {
      console.error("Trend API error", result);
      return;
    }

    const labels = result.data.map(x => x.date);
    const values = result.data.map(x => x.users);

    const ctx = document.getElementById("trendChart");

    if (!ctx) {
      console.error("trendChart not found");
      return;
    }

    // Destroy previous chart
    if (window.trendInstance) {
      window.trendInstance.destroy();
    }

    window.trendInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Users per Day',
          data: values,
          fill: false,
          tension: 0.3
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false }
        }
      }
    });

  } catch (err) {
    console.error("Trend Chart Error:", err);
  }
}
  
function applyFilters() {

  const mobile = document.getElementById("mobile").value.trim().toLowerCase();
  const urn = document.getElementById("urn").value.trim().toLowerCase();
  const dateInput = document.getElementById("date").value;

  let formattedDate = "";
  if (dateInput) {
    const [y, m, d] = dateInput.split("-");
    formattedDate = `${d}/${m}/${y}`;
  }

  let filtered = fullData.filter(item => {

    const itemMobile = (
      item.mobile_number ||
      item.mobile ||
      item.phone_number ||
      ""
    ).toString().trim().toLowerCase();

    const itemUrn = (item.urn || "").toString().trim().toLowerCase();

    const itemDate = (item.date || "")
      .replace(/-/g, "/")
      .trim();

    let matchMobile = !mobile || itemMobile.includes(mobile);
    let matchUrn = !urn || itemUrn.includes(urn);
    let matchDate = !formattedDate || itemDate === formattedDate;

    return matchMobile && matchUrn && matchDate;
  });

  if (currentMilestone === 'mile1') renderMile1(filtered);
  else if (currentMilestone === 'mile2') renderMile2(filtered);
  else if (currentMilestone === 'mile3') renderMile3(filtered);
  else if (currentMilestone === 'mile4') renderMile4(filtered);
  else if (currentMilestone === 'final') renderFinalReport(filtered);
}
  function downloadCSV(data = fullData) {

  if (!data || data.length === 0) {
    alert("No data available to download");
    return;
  }

  // 🔥 Get headers dynamically
  const headers = Object.keys(data[0]);

  // 🔥 Convert JSON → CSV
  const csvRows = [];

  // Header row
  csvRows.push(headers.join(","));

  // Data rows
  data.forEach(row => {
    const values = headers.map(header => {
      let val = row[header] ?? "";

      // Escape commas & quotes
      val = val.toString().replace(/"/g, '""');

      return `"${val}"`;
    });

    csvRows.push(values.join(","));
  });

  const csvString = csvRows.join("\n");

  // 🔥 Download file
  const blob = new Blob([csvString], { type: "text/csv" });
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.setAttribute("href", url);
  a.setAttribute("download", `${currentMilestone}_report.csv`);
  a.click();
}
